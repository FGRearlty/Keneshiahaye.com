name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ── Validate before deploying ───────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: HTML validation
        run: npx html-validate '*.html' 'blog/*.html' 'areas/*.html'

      - name: Linting
        run: npm run test:lint

      - name: Validate _redirects
        run: node scripts/validate-redirects.js

      - name: Validate _headers
        run: node scripts/validate-headers.js

      - name: Check internal links
        run: node scripts/check-links.js

  # ── Deploy to production (only after validate passes) ───────
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Build Tailwind CSS
        run: npx @tailwindcss/cli -i src/input.css -o css/styles.css --minify

      - name: Remove non-site files
        run: |
          rm -rf va-resources/extracted-zip1 va-resources/extracted-zip2 _deploy ghl-integration email-templates .github .claude node_modules src scripts tests

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=keneshiahaye-com --branch=main --commit-hash=${{ github.sha }}
